<!DOCTYPE html>
<html>
<head>
  <title>CYH Calendar Embed Preview</title>
  <style>
    body { font-family: Georgia, serif; background: #f0f0f0; padding: 40px; }
    .host-content { max-width: 800px; margin: 0 auto; }
    h1 { color: #333; }
  </style>
</head>
<body>
  <div class="host-content">
    <h1>Sample Organization Website</h1>
    <p>This demonstrates the embedded calendar widget below:</p>
    <div id="cyh-calendar"></div>
  </div>
  <script src="/dist/embed.js"></script>
  <script>
    CYHCalendar.init({
      container: '#cyh-calendar',
      orgId: 'preview',
      apiUrl: 'http://localhost:3001',
      showConnectedOrgs: true,
      theme: {
        primaryColor: '#2563eb',
        backgroundColor: '#ffffff',
        textColor: '#1f2937',
        accentColor: '#f59e0b',
        borderRadius: '8px'
      },
      defaultView: 'month'
    });
  </script>
</body>
</html>
